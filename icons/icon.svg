<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- background: warm cream paper -->
  <rect width="512" height="512" rx="96" fill="#EFEAE0"/>

  <!-- photo card -->
  <rect x="76" y="64" width="360" height="312" rx="18" fill="#FFFFFF" stroke="#E2DACC" stroke-width="2"/>

  <!-- stylized mountain/photo content -->
  <clipPath id="cardClip">
    <rect x="76" y="64" width="360" height="240" rx="18"/>
  </clipPath>
  <g clip-path="url(#cardClip)">
    <rect x="76" y="64" width="360" height="240" fill="#2D3A4F"/>
    <circle cx="380" cy="130" r="36" fill="#F5E6C8" opacity="0.85"/>
    <polygon points="76,304 180,180 240,230 340,150 436,260 436,304" fill="#1C2533"/>
    <polygon points="76,304 220,220 320,260 436,200 436,304" fill="#243246"/>
  </g>

  <!-- watermark bar with red strip -->
  <rect x="76" y="304" width="360" height="72" rx="0" fill="#FFFFFF"/>
  <rect x="76" y="304" width="360" height="10" fill="#E2001A"/>
  <rect x="76" y="358" width="360" height="18" rx="0" fill="#FFFFFF"/>

  <!-- accent brand mark below -->
  <text x="256" y="450" font-family="Georgia, 'Songti SC', serif" font-size="64" font-weight="700" fill="#C2632D" text-anchor="middle" letter-spacing="6">YINJI</text>
</svg>
