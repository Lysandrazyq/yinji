<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- vivid warm brand gradient: gives the glass something to refract -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD9A8"/>
      <stop offset="0.5" stop-color="#F2965E"/>
      <stop offset="1" stop-color="#C2632D"/>
    </linearGradient>
    <!-- dusk sky inside the photo -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A4D78"/>
      <stop offset="0.55" stop-color="#7C6A9C"/>
      <stop offset="1" stop-color="#E8896B"/>
    </linearGradient>
    <!-- diagonal glossy sheen across the glass -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- frosted (translucent) watermark bar -->
    <linearGradient id="frost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.62"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#5A2A12" flood-opacity="0.30"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="78" y="86" width="356" height="340" rx="56"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- soft light blobs for depth behind the glass -->
  <circle cx="120" cy="110" r="120" fill="#FFFFFF" opacity="0.18"/>
  <circle cx="430" cy="420" r="150" fill="#9A3D12" opacity="0.20"/>

  <!-- glass card float shadow (source rect is hidden under the clipped photo) -->
  <g filter="url(#cardShadow)">
    <rect x="78" y="86" width="356" height="340" rx="56" fill="#FFFFFF" opacity="0.14"/>
  </g>

  <!-- photo + frosted watermark bar, clipped to the rounded card -->
  <g clip-path="url(#cardClip)">
    <rect x="78" y="86" width="356" height="268" fill="url(#sky)"/>
    <circle cx="356" cy="168" r="40" fill="#FFF0CE" opacity="0.92"/>
    <polygon points="78,354 188,236 250,288 338,210 434,300 434,354" fill="#2A2740" opacity="0.92"/>
    <polygon points="78,354 220,276 320,310 434,250 434,354" fill="#3A3656" opacity="0.95"/>

    <rect x="78" y="354" width="356" height="72" fill="url(#frost)"/>
    <rect x="78" y="354" width="356" height="11" fill="#E2001A"/>
    <rect x="104" y="384" width="150" height="12" rx="6" fill="#2D3A4F" opacity="0.55"/>
    <rect x="104" y="402" width="96" height="9" rx="4.5" fill="#2D3A4F" opacity="0.32"/>
    <circle cx="402" cy="394" r="13" fill="#E2001A" opacity="0.85"/>
  </g>

  <!-- glossy sheen + bright glass rim on top -->
  <rect x="78" y="86" width="356" height="340" rx="56" fill="url(#sheen)"/>
  <rect x="78.5" y="86.5" width="355" height="339" rx="55.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="2"/>

  <!-- brand mark -->
  <text x="256" y="478" font-family="Georgia, 'Songti SC', serif" font-size="40" font-weight="700" fill="#FFFFFF" fill-opacity="0.95" text-anchor="middle" letter-spacing="6">YINJI</text>
</svg>
